<!DOCTYPE html>
<html>
<head>
  <title>Tag Validator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    h2 {
      margin-top: 40px;
    }

    button {
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      margin-right: 10px;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .status {
      margin: 15px 0;
      color: #cbd5f5;
    }

    .product {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #334155;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .open-btn {
      margin-top: 10px;
      display: inline-block;
      background: #22c55e;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      font-size: 13px;
    }

    .section {
      margin-top: 30px;
      padding: 20px;
      background: #020617;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<!-- 🔵 LIVE RUN SECTION -->
<div class="section">
  <h2>Validate & Fix Tags</h2>

  <button id="btn">Start Validation</button>

  <div class="status" id="statusText">Idle</div>
</div>

<!-- 🟢 RECENT RUNS SECTION -->
<div class="section">
  <h2>Recent Runs</h2>

  <button id="viewResultsBtn">View Last Results</button>

  <div id="results"></div>
</div>

<script>
const btn = document.getElementById("btn");
const viewBtn = document.getElementById("viewResultsBtn");
const statusText = document.getElementById("statusText");
const resultsDiv = document.getElementById("results");

const SHOP = "your-store.myshopify.com";

let polling = false;

// ✅ ONLY poll AFTER clicking button
async function fetchStatus() {
  if (!polling) return;

  try {
    const res = await fetch("/status");
    const data = await res.json();

    if (data.status === "running") {
      statusText.innerText = data.message || "Processing...";
    }

    if (data.status === "completed") {
      statusText.innerText = "Completed ✅";
      btn.disabled = false;
      btn.innerText = "Start Validation";
      polling = false;
    }

  } catch {
    statusText.innerText = "Error fetching status";
    polling = false;
  }
}

btn.onclick = async () => {
  btn.disabled = true;
  btn.innerText = "Starting...";
  statusText.innerText = "Starting new run...";

  resultsDiv.innerHTML = "";

  await fetch("/initiate-bulk-operation");

  polling = true;

  // start polling loop
  const interval = setInterval(() => {
    if (!polling) {
      clearInterval(interval);
      return;
    }
    fetchStatus();
  }, 1000);
};


// 🟢 VIEW RESULTS (separate concern)
viewBtn.onclick = async () => {
  const res = await fetch("/results");
  const products = await res.json();

  resultsDiv.innerHTML = "";

  if (!products.length) {
    resultsDiv.innerHTML = "<h3>No invalid tags found</h3>";
    return;
  }

  products.forEach(product => {
    const numericId = product.id.split("/").pop();

    const html = `
      <div class="product">
        <div><strong>ID:</strong> ${numericId}</div>

        <div class="tags">
          ${product.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
        </div>

        <a class="open-btn" target="_blank"
          href="https://${SHOP}/admin/products/${numericId}">
          Open in Shopify →
        </a>
      </div>
    `;

    resultsDiv.innerHTML += html;
  });
};
</script>

</body>
</html>
