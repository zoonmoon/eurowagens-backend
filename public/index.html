<!DOCTYPE html>
<html>
<head>
  <title>Tag Validator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    button {
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      margin-right: 10px;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .status {
      margin: 15px 0;
      color: #cbd5f5;
    }

    .product {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #334155;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .open-btn {
      margin-top: 10px;
      display: inline-block;
      background: #22c55e;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      font-size: 13px;
    }

    #viewResultsBtn {
      display: none;
      background: #22c55e;
    }
  </style>
</head>
<body>

<button id="btn">Validate & Fix Tags</button>
<button id="viewResultsBtn">View Fixes</button>

<div class="status" id="statusText">Checking status...</div>

<div id="results"></div>

<script>
const btn = document.getElementById("btn");
const viewBtn = document.getElementById("viewResultsBtn");
const statusText = document.getElementById("statusText");
const resultsDiv = document.getElementById("results");

const SHOP = "your-store.myshopify.com"; // ⚠️ change this

let lastStatus = "";

async function fetchStatus() {
  try {
    const res = await fetch("/status");
    const data = await res.json();

    if (data.status === lastStatus) return;
    lastStatus = data.status;

    if (data.status === "running") {
      btn.disabled = true;
      btn.innerText = "Processing...";
      statusText.innerText = data.message || "Processing...";
      viewBtn.style.display = "none";
    } else {
      btn.disabled = false;
      btn.innerText = "Validate & Fix Tags";
      statusText.innerText = data.message || "Ready";

      if (data.status === "completed") {
        viewBtn.style.display = "inline-block";
      }
    }

  } catch {
    btn.disabled = false;
    statusText.innerText = "Ready";
  }
}

btn.onclick = async () => {
  btn.disabled = true;
  btn.innerText = "Starting...";

  // ✅ HIDE OLD RESULTS
  resultsDiv.innerHTML = "";
  resultsDiv.style.display = "none";

  await fetch("/initiate-bulk-operation", { method: "GET" });

  fetchStatus();
};


viewBtn.onclick = async () => {
  const res = await fetch("/results");
  const products = await res.json();

  // ✅ SHOW RESULTS AGAIN
  resultsDiv.style.display = "block";
  resultsDiv.innerHTML = "";

  if (!products.length) {
    resultsDiv.innerHTML = "<h3>No invalid tags found</h3>";
    return;
  }

  products.forEach(product => {
    const numericId = product.id.split("/").pop();

    const html = `
      <div class="product">
        <div><strong>ID:</strong> ${numericId}</div>

        <div class="tags">
          ${product.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
        </div>

        <a class="open-btn" target="_blank"
          href="https://${SHOP}/admin/products/${numericId}">
          Open in Shopify →
        </a>
      </div>
    `;

    resultsDiv.innerHTML += html;
  });
};


// 1 sec polling
setInterval(fetchStatus, 1000);
fetchStatus();
</script>

</body>
</html>
