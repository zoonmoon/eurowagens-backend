<!DOCTYPE html>
<html>
<head>
  <title>Tag Validator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    h2 {
      margin-top: 40px;
    }

    button {
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      margin-right: 10px;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .status {
      margin: 15px 0;
      color: #cbd5f5;
    }

    .product {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #334155;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .open-btn {
      margin-top: 10px;
      display: inline-block;
      background: #22c55e;
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: white;
      font-size: 13px;
    }

    .section {
      margin-top: 30px;
      padding: 20px;
      background: #020617;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<!-- 🔵 LIVE RUN SECTION -->
<div class="section">
  <h2>Validate & Fix Tags</h2>

  <button id="btn">Start Validation</button>

  <div class="status" id="statusText"></div>
</div>

<!-- 🟢 RECENT RUNS SECTION -->
<div class="section">
  <h2>Recent Runs</h2>
  <hr style="margin-top:20px; margin-bottom:20px;opacity:0.5">
  <button id="view-all-runs">View all Runs</button>

  <button id="viewResultsBtn">View Results for Latest Run</button>

  <div id="results"></div>
</div>

<script>

const btn = document.getElementById("btn");
const viewBtn = document.getElementById("viewResultsBtn");
const statusText = document.getElementById("statusText");
const resultsDiv = document.getElementById("results");

const SHOP = "eurowagens-com.myshopify.com";

let polling = false;


async function initializeState() {
  try {
    btn.disabled = true;

    const res = await fetch("/status");
    const data = await res.json();

    if (data.status === "running") {
      // 🔒 LOCK UI
      btn.disabled = true;
      btn.innerText = "Processing...";
      statusText.innerText = data.message || "Processing...";

      polling = true;

      // 🔁 resume polling
      const interval = setInterval(() => {
        if (!polling) {
          clearInterval(interval);
          return;
        }
        fetchStatus();
      }, 1000);
    } else {
      // idle or completed
      btn.disabled = false;
      btn.innerText = "Start Validation";
      statusText.innerText = "Completed previous run.";
    }

  } catch {
    statusText.innerText = "Error initializing state";
  }
}

// 🔁 LOAD RESULTS FUNCTION (reusable)
async function loadResults(label = "Last Run Results") {
  const res = await fetch("/results");
  const products = await res.json();

  resultsDiv.innerHTML = `<h3>${label}</h3>`;

  if (!products.length) {
    resultsDiv.innerHTML += "<p>No invalid tags found</p>";
    return;
  }

  products.forEach(product => {
    const numericId = product.id.split("/").pop();

    const html = `
      <div class="product">
        <div><strong>ID:</strong> ${numericId}</div>

        <div class="tags">
          ${product.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
        </div>

        <a class="open-btn" target="_blank"
          href="https://${SHOP}/admin/products/${numericId}">
          Open in Shopify →
        </a>
      </div>
    `;

    resultsDiv.innerHTML += html;
  });
}


// ✅ ONLY poll AFTER clicking button
async function fetchStatus() {
  if (!polling) return;

  try {
    const res = await fetch("/status");
    const data = await res.json();

    if (data.status === "running") {
      btn.innerText = "Processing...";
      statusText.innerText = data.message || "Processing...";
    }

    if (data.status === "completed") {
      statusText.innerText = "Completed ✅";
      btn.disabled = false;
      btn.innerText = "Start Validation";
      polling = false;

      // 🔥 AUTO REFRESH RESULTS AFTER COMPLETION
      loadResults("Last Run Results (Updated)");
    }

  } catch {
    statusText.innerText = "Error fetching status";
    polling = false;
  }
}


// ▶️ START NEW RUN
btn.onclick = async () => {
  btn.disabled = true;
  btn.innerText = "Starting...";
  statusText.innerText = "Starting new run...";

  await fetch("/initiate-bulk-operation");

  polling = true;

  const interval = setInterval(() => {
    if (!polling) {
      clearInterval(interval);
      return;
    }
    fetchStatus();
  }, 1000);
};


// 🟢 OPTIONAL: keep manual refresh button
viewBtn.onclick = () => loadResults("Last Run Results (Manual Refresh)");


// 🚀 LOAD RESULTS ON PAGE LOAD

initializeState();
loadResults();

</script>


<!-- for the modal -->

<script>

// ===============================
// 🚀 VIEW ALL RUNS - FULL JS ONLY
// ===============================

// 1. Inject styles
const style = document.createElement("style");
style.innerHTML = `
.modal-overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.modal-box {
  background:#020617;
  width:600px;
  max-height:80vh;
  overflow-y:auto;
  border-radius:12px;
  padding:20px; 
  padding-bottom:0px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  color:white;
}

.modal-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  padding-bottom:0px;
  position:sticky;
  top:0px;
  background: #020617;

}

.close-btn {
  cursor:pointer;
  font-size:22px;
}

.run-item {
  background:#1e293b;
  padding:12px;
  border-radius:8px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
#modalBody{
  padding:20px;
  padding-top:0px;
}
.download-btn {
  background:#22c55e;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  color:white;
  font-size:13px;
}


.modal-header .close-btn{
  font-size:40px;
}

.spinner {
  border:4px solid #334155;
  border-top:4px solid #3b82f6;
  border-radius:50%;
  width:40px;
  height:40px;
  margin:40px auto;
  animation:spin 1s linear infinite;
}
.modal-header h3{
  margin-top: 0;
  margin-bottom:0;
}
.modal-box{
  border:1px solid white;
  padding:0;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}
`;
document.head.appendChild(style);


// 2. Create modal dynamically
const modal = document.createElement("div");
modal.className = "modal-overlay";
modal.style.display = "none";

modal.innerHTML = `
  <div class="modal-box">
    <div class="modal-header">
      <h3>Recent Runs</h3>
      <span class="close-btn">&times;</span>
    </div>
    <div id="modalBody"></div>
  </div>
`;

document.body.appendChild(modal);

const modalBody = modal.querySelector("#modalBody");
const closeBtn = modal.querySelector(".close-btn");


// 3. Get or create button
let viewAllBtn = document.getElementById("view-all-runs");

if (!viewAllBtn) {
  viewAllBtn = document.createElement("button");
  viewAllBtn.innerText = "View all Runs";
  document.body.appendChild(viewAllBtn);
}


// 4. Open modal + fetch data
viewAllBtn.onclick = async () => {
  modal.style.display = "flex";

  // spinner
  modalBody.innerHTML = `<div class="spinner"></div>`;

  try {
    const res = await fetch("/recent-tag-corrections-list");
    const files = await res.json();

    if (!files.length) {
      modalBody.innerHTML = "<p>No runs found</p>";
      return;
    }

    modalBody.innerHTML = "";

    files.forEach(file => {
      const item = document.createElement("div");
      item.className = "run-item";

      item.innerHTML = `
        <div>
          <div><strong>${file.name.replaceAll('json','csv').replaceAll('most_recent_invalid_products_', '')}</strong></div>
        </div>
        <button class="download-btn">Download</button>
      `;

      // 🔥 DOWNLOAD
      item.querySelector("button").onclick = () => {
        const url = `/download-tag-correction-log?dirName=${encodeURIComponent(file.directory)}&file_name=${encodeURIComponent(file.name)}`;
        window.open(url, "_blank");
      };

      modalBody.appendChild(item);
    });

  } catch (err) {
    modalBody.innerHTML = "<p>Error loading runs</p>";
  }
};


// 5. Close modal
closeBtn.onclick = () => {
  modal.style.display = "none";
};

// click outside
modal.onclick = (e) => {
  return 
  if (e.target === modal) {
    modal.style.display = "none";
  }
};

</script>







</body>
</html>
